<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>母アバター 10案</title>
<link rel="stylesheet" href="/styles.css">
<style>
body{padding:24px;}
h1{font-size:20px;}
.row{display:flex;gap:10px;margin:10px 0 18px;}
.row button{padding:8px 14px;border-radius:10px;border:1.5px solid var(--accent);background:transparent;color:var(--accent-deep);font-weight:700;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:16px;max-width:820px;}
.cell{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shadow-sm);}
.cell .av{width:64px;height:64px;margin:0 auto 8px;color:var(--accent-deep);background:var(--accent-soft);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.cell .no{font-size:13px;font-weight:800;}
.cell .nm{font-size:11px;color:var(--muted);}
</style></head><body>
<h1>👩 母アバター 10案（番号で選んでください）</h1>
<div class="row">
  <button onclick="document.body.classList.remove('theme-dark')">クリーム</button>
  <button onclick="document.body.classList.add('theme-dark')">ダーク</button>
</div>
<div class="grid" id="grid"></div>
<script>
const C='currentColor';
const BODY=`<path d="M4.6 20.8c0-4.2 3.4-6.8 7.4-6.8s7.4 2.6 7.4 6.8Z" fill="${C}"/>`;
// 10案（スタイル違い）
const MOMS=[
 ["①ロング(塗り)", `<path d="M6.3 13C5.3 6 8 3 12 3s6.7 3 5.7 10c-.5-1.4-1.5-1.8-1.5-1.8.6-3.8-1.2-6-4.2-6S8.4 7.4 9 11.2c0 0-1.2.4-1.7 1.8z" fill="${C}"/><circle cx="12" cy="8.4" r="3.6" fill="${C}"/>`+BODY],
 ["②バッジ円", `<circle cx="12" cy="12" r="10.5" fill="${C}" opacity=".14"/><path d="M7 13C6.2 7.4 8.6 5 12 5s5.8 2.4 5 8c-.4-1.1-1.2-1.4-1.2-1.4.5-3.1-1-4.9-3.8-4.9S8.6 8.5 9.2 11.6c0 0-1 .3-1.2 1.4z" fill="${C}"/><circle cx="12" cy="9.4" r="3" fill="${C}"/><path d="M6.5 19.5c0-3.4 2.8-5.5 5.5-5.5s5.5 2.1 5.5 5.5Z" fill="${C}"/>`],
 ["③線画ロング", `<circle cx="12" cy="8.5" r="3.4" fill="none" stroke="${C}" stroke-width="1.5"/><path d="M8.6 9C7.5 5.5 9.4 3.6 12 3.6s4.5 1.9 3.4 5.4" fill="none" stroke="${C}" stroke-width="1.5"/><path d="M8.6 8.6C7.8 11 8 13 8.8 14.6M15.4 8.6C16.2 11 16 13 15.2 14.6" fill="none" stroke="${C}" stroke-width="1.5"/><path d="M5 20.6c0-3.8 3.1-6.4 7-6.4s7 2.6 7 6.4" fill="none" stroke="${C}" stroke-width="1.5"/>`],
 ["④顔抜き(マスク)", `<path d="M5.5 14.5C5 6.5 8.4 3.4 12 3.4s7 3.1 6.5 11.1z" fill="${C}"/><ellipse cx="12" cy="11.2" rx="3.3" ry="3.9" fill="#fff"/>`+BODY],
 ["⑤ポニーテール", `<circle cx="12" cy="8.4" r="3.6" fill="${C}"/><path d="M8.7 7C9.4 5 14.6 5 15.3 7c-1-.8-6.6-.8-6.6 0z" fill="${C}"/><path d="M15 8.6c2.6.3 3.8 3 3 7l-1.9-.5c.6-2.8-.1-4.4-1.9-4.8z" fill="${C}"/>`+BODY],
 ["⑥お団子(まとめ髪)", `<circle cx="12" cy="3.4" r="1.9" fill="${C}"/><path d="M6.6 11.6C6.6 6.6 8.9 4.2 12 4.2s5.4 2.4 5.4 7.4c-1.1-2.4-3.1-3.2-5.4-3.2s-4.3.8-5.4 3.2z" fill="${C}"/><circle cx="12" cy="9" r="3.4" fill="${C}"/>`+BODY],
 ["⑦ウェーブ", `<path d="M5.6 13c-.8-6.4 2.6-9.4 6.4-9.4s6.6 3 6.4 9.4c-.8-1-1.7-1-2.2-.6.3-1.2-.7-2.2-1.4-1.2-.7-1.8-2-2.8-3.2-2.8s-2.5 1-3.2 2.8c-.7-1-1.7 0-1.4 1.2-.5-.4-1.4-.4-2.2.6z" fill="${C}"/><circle cx="12" cy="9.2" r="3.3" fill="${C}"/>`+BODY],
 ["⑧ボブ(短め)", `<path d="M5.9 12.2C5.9 6.5 8.5 4.1 12 4.1s6.1 2.4 6.1 8.1c-.8-.5-1.5-.6-1.5-.6.4-3.9-1.5-5.6-4.6-5.6S7.1 7.7 7.4 11.5c0 0-.7.2-1.5.7z" fill="${C}"/><circle cx="12" cy="8.6" r="3.5" fill="${C}"/>`+BODY],
 ["⑨まる顔ミニマル", `<circle cx="12" cy="9.5" r="5.2" fill="${C}"/><path d="M6.9 8C8.2 4.8 15.8 4.8 17.1 8c-1.6-1.4-9-1.4-10.2 0z" fill="${C}"/><path d="M5.6 21c0-3.6 2.9-5.9 6.4-5.9s6.4 2.3 6.4 5.9Z" fill="${C}"/>`],
 ["⑩ロング＋ハート", `<path d="M6.3 13C5.3 6 8 3 12 3s6.7 3 5.7 10c-.5-1.4-1.5-1.8-1.5-1.8.6-3.8-1.2-6-4.2-6S8.4 7.4 9 11.2c0 0-1.2.4-1.7 1.8z" fill="${C}"/><circle cx="12" cy="8.4" r="3.6" fill="${C}"/>`+BODY+`<path d="M18.5 5.4c.5-.65 1.5-.25 1.3.55-.12.45-1.3 1.05-1.3 1.05s-1.18-.6-1.3-1.05c-.2-.8.8-1.2 1.3-.55z" fill="#e0719a" stroke="none"/>`],
];
function svg(b){return `<svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="${C}" stroke-linecap="round" stroke-linejoin="round">${b}</svg>`;}
document.getElementById("grid").innerHTML = MOMS.map(([nm,b],i)=>
 `<div class="cell"><div class="av">${svg(b)}</div><div class="no">${nm.slice(0,2)}</div><div class="nm">${nm.slice(2)}</div></div>`
).join("");
</script>
</body></html>
