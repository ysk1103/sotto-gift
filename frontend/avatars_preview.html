<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アバター プレビュー</title>
<link rel="stylesheet" href="/styles.css">
<style>
body{padding:24px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:16px;max-width:760px;}
.cell{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shadow-sm);}
.cell .av{width:54px;height:54px;margin:0 auto 8px;color:var(--accent-deep);}
.cell .lb{font-size:12px;font-weight:700;}
h1{font-size:20px;}
.row{display:flex;gap:10px;margin:10px 0 20px;}
.row button{padding:8px 14px;border-radius:10px;border:1.5px solid var(--accent);background:transparent;color:var(--accent-deep);font-weight:700;cursor:pointer;}
</style></head><body>
<h1>👤 アバター（識別できるか確認）</h1>
<div class="row">
  <button onclick="document.body.classList.remove('theme-dark')">クリーム</button>
  <button onclick="document.body.classList.add('theme-dark')">ダーク</button>
</div>
<div class="grid" id="grid"></div>
<script src="/icons.js"></script>
<script>
const order=["woman","man","elder_woman","elder_man","girl","boy","person","couple"];
document.getElementById("grid").innerHTML = order.map(k =>
  `<div class="cell"><div class="av">${icon(k,54)}</div><div class="lb">${AVATAR_LABELS[k]}</div></div>`
).join("");
</script>
</body></html>
