<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アバター案v2（サークル/色分け）</title>
<link rel="stylesheet" href="/styles.css">
<style>
body{padding:24px;}
h1{font-size:20px;} .lead{color:var(--muted);font-size:13px;}
.row{display:flex;gap:10px;margin:10px 0 18px;}
.row button{padding:8px 14px;border-radius:10px;border:1.5px solid var(--accent);background:transparent;color:var(--accent-deep);font-weight:700;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:16px;max-width:820px;}
.cell{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shadow-sm);}
.cell svg{width:64px;height:64px;}
.cell .nm{font-size:12px;font-weight:700;margin-top:6px;}
</style></head><body>
<h1>アバター案 v2（サークル＋色分け）</h1>
<p class="lead">ピンク＝女性／ブルー＝男性／グレー＝中立。パートナー＝2円重ね、フレンド＝2円並び。</p>
<div class="row">
  <button onclick="document.body.classList.remove('theme-dark')">クリーム</button>
  <button onclick="document.body.classList.add('theme-dark')">ダーク</button>
</div>
<div class="grid" id="grid"></div>
<script>
const F='#f09199', M='#97b6cc', N='#9aa3ad';   // 桃色 / くすみブルー / 中立グレー
const ring=(c,cx=12,cy=12,r=9,w=2.2)=>`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c}" stroke-width="${w}"/>`;
const glasses=(c)=>`<circle cx="9.6" cy="12" r="1.7" fill="none" stroke="${c}" stroke-width="1.3"/><circle cx="14.4" cy="12" r="1.7" fill="none" stroke="${c}" stroke-width="1.3"/><path d="M11.3 12h1.4" stroke="${c}" stroke-width="1.3"/>`;
const SET=[
 ["母", ring(F)+`<path d="M12 3.4C11 6.4 9 7.4 7.2 7.7M12 3.4C13 6.4 15 7.4 16.8 7.7" fill="none" stroke="${F}" stroke-width="1.6"/>`],
 ["父", ring(M)+`<path d="M7.6 7.6C9.6 5.6 14.4 5.6 16.4 7.6" fill="none" stroke="${M}" stroke-width="1.6"/>`],
 ["祖母", ring(F)+`<circle cx="12" cy="2.7" r="1.6" fill="${F}"/>`+glasses(F)],
 ["祖父", ring(M)+`<path d="M7.6 7.4C9.6 5.4 14.4 5.4 16.4 7.4" fill="none" stroke="${M}" stroke-width="1.6"/>`+glasses(M)],
 ["女の子", ring(F)+`<path d="M5.6 13.4c-2.1.7-3.4 2.9-2.7 5.6.4 1.7 2.2 1.7 3-.1.8-1.8.7-3.9-.3-5.5z" fill="${F}"/><path d="M18.4 13.4c2.1.7 3.4 2.9 2.7 5.6-.4 1.7-2.2 1.7-3-.1-.8-1.8-.7-3.9.3-5.5z" fill="${F}"/>`],
 ["男の子", ring(M)+`<path d="M8 7.4C8.6 5.6 11 5.2 12 6.6 13 5.2 15.4 5.6 16 7.4" fill="none" stroke="${M}" stroke-width="1.5"/>`],
 ["パートナー", ring(M,9,12,6.3,2)+ring(F,15,12,6.3,2)],
 ["フレンド", ring(N,8,12,6,2)+ring(N,16,12,6,2)],
];
const svg=b=>`<svg viewBox="0 0 24 24">${b}</svg>`;
document.getElementById("grid").innerHTML = SET.map(([nm,b])=>
 `<div class="cell">${svg(b)}<div class="nm">${nm}</div></div>`).join("");
</script>
</body></html>
