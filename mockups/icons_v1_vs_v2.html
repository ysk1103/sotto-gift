<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同じ8ジャンルを再生成（v1 vs v2）</title>
<style>
body{font-family:"Hiragino Kaku Gothic ProN","Segoe UI",sans-serif;margin:0;padding:26px;background:#f5f0e6;color:#37322a;}
h1{font-size:21px;margin:0 0 4px;font-family:Georgia,serif;} .lead{color:#938a78;font-size:13px;margin:0 0 22px;}
table{border-collapse:collapse;width:100%;max-width:820px;}
th{font-size:12px;color:#938a78;font-weight:700;text-align:center;padding:8px;}
td{padding:14px 8px;border-top:1px solid #e7ddc9;text-align:center;}
td.name{text-align:left;font-size:13px;color:#37322a;font-weight:700;width:140px;}
svg{color:#c25a3c;}
</style></head><body>
<h1>同じ8ジャンルを、もう一度・別デザインで生成</h1>
<p class="lead">v1（最初の案）と v2（今つくり直した別案）。同じ概念でも形が変わる＝固定素材のコピーではなく、私がその都度コードで描いている証拠です。お好みのものを採用できます。</p>
<table>
<tr><th></th><th>v1（採用中）</th><th>v2（再生成）</th></tr>
<tbody id="rows"></tbody>
</table>
<script>
const S=(b)=>`<svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${b}</svg>`;
const ROWS=[
["提案（ギフト）",
 `<rect x="3" y="8" width="18" height="4" rx="1"/><rect x="4.5" y="12" width="15" height="8" rx="1"/><line x1="12" y1="8" x2="12" y2="20"/><path d="M12 8C9.5 4 6 5.5 12 8"/><path d="M12 8C14.5 4 18 5.5 12 8"/>`,
 `<rect x="4" y="10" width="16" height="9" rx="1.5"/><line x1="4" y1="13" x2="20" y2="13"/><line x1="12" y1="10" x2="12" y2="19"/><path d="M12 10C12 7 9 5 7.5 6.5 6 8 9 10 12 10z"/><path d="M12 10c0-3 3-5 4.5-3.5C18 8 15 10 12 10z"/>`],
["人",
 `<circle cx="8.5" cy="8" r="2.8"/><path d="M4 19c0-2.7 2-4.5 4.5-4.5S13 16.3 13 19"/><circle cx="16" cy="8.5" r="2.3"/><path d="M14.8 14.7c2.2.2 4.2 2 4.2 4.3"/>`,
 `<circle cx="12" cy="7" r="2.4"/><path d="M8 13.5c0-2.2 1.8-3.8 4-3.8s4 1.6 4 3.8"/><circle cx="5.5" cy="9.5" r="2"/><path d="M2.5 15c0-2 1.4-3.3 3.2-3.4"/><circle cx="18.5" cy="9.5" r="2"/><path d="M21.5 15c0-2-1.4-3.3-3.2-3.4"/>`],
["カレンダー",
 `<rect x="3.5" y="5" width="17" height="15" rx="2"/><line x1="3.5" y1="9.5" x2="20.5" y2="9.5"/><line x1="8" y1="3" x2="8" y2="6"/><line x1="16" y1="3" x2="16" y2="6"/><circle cx="9" cy="14" r="1"/><circle cx="15" cy="14" r="1"/>`,
 `<path d="M4 6h16v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z"/><path d="M4 6V5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v1"/><path d="M9 13l2 2 4-4"/>`],
["設定",
 `<line x1="4" y1="6.5" x2="20" y2="6.5"/><circle cx="9" cy="6.5" r="2"/><line x1="4" y1="12" x2="20" y2="12"/><circle cx="15" cy="12" r="2"/><line x1="4" y1="17.5" x2="20" y2="17.5"/><circle cx="8" cy="17.5" r="2"/>`,
 `<circle cx="12" cy="12" r="3"/><path d="M12 3.5v2.5M12 18v2.5M20.5 12H18M6 12H3.5M17.7 6.3l-1.8 1.8M8.1 15.9l-1.8 1.8M17.7 17.7l-1.8-1.8M8.1 8.1 6.3 6.3"/>`],
["誕生日",
 `<line x1="3.5" y1="20.5" x2="20.5" y2="20.5"/><path d="M5.5 20.5v-7c0-1 .8-1.8 1.8-1.8h9.4c1 0 1.8.8 1.8 1.8v7"/><path d="M5.5 15c1.3 1.3 2.8 1.3 4 0s2.8-1.3 4 0 2.8 1.3 4 0"/><line x1="12" y1="7" x2="12" y2="11"/><path d="M12 4.5c1.2 1 1.2 2.5 0 2.5s-1.2-1.5 0-2.5z"/>`,

["記念日",
 `<path d="M12 20s-7-4.6-7-9.7a3.9 3.9 0 0 1 7-2.4 3.9 3.9 0 0 1 7 2.4C19 15.4 12 20 12 20z"/>`,
 `<path d="M9 16s-4-2.7-4-5.6a2.3 2.3 0 0 1 4-1.4 2.3 2.3 0 0 1 4 1.4C13 13.3 9 16 9 16z"/><path d="M15.5 19s-3.2-2.2-3.2-4.5a1.85 1.85 0 0 1 3.2-1.1 1.85 1.85 0 0 1 3.2 1.1c0 2.3-3.2 4.5-3.2 4.5z"/>`],
["クリスマス",
 `<path d="M12 3.5l-4 6h8z"/><path d="M12 7l-5.5 8h11z"/><rect x="10.5" y="15" width="3" height="3.5"/><circle cx="12" cy="3" r="0.7" fill="currentColor" stroke="none"/>`,
 `<circle cx="12" cy="13" r="6"/><rect x="10.5" y="4.5" width="3" height="2.5" rx=".5"/><line x1="12" y1="3" x2="12" y2="4.5"/><path d="M6.5 11.5c3 1.5 8 1.5 11 0M7 15c2.6 1.2 7.4 1.2 10 0"/>`],
["振袖（着物）",
 `<path d="M12 4.5 9.7 6.5 9 20h6l-.7-13.5z"/><path d="M12 4.5 9.7 6.5M12 4.5l2.3 2"/><path d="M9.7 6.7 6.5 9l1 4M14.3 6.7 17.5 9l-1 4"/><line x1="8.7" y1="12.5" x2="15.3" y2="12.5" stroke-width="2.2"/>`,
 `<path d="M12 4 9 5.8 8.3 20h7.4L15 5.8z"/><path d="M12 4 9 5.8M12 4l3 1.8"/><path d="M9 6 5.5 8.5 6.8 14.5M15 6l3.5 2.5-1.3 6"/><rect x="8.3" y="11.5" width="7.4" height="2.4"/><path d="M11 13.9l-1 2.5M13 13.9l1 2.5"/>`],
];
document.getElementById("rows").innerHTML = ROWS.map(([n,a,b])=>
 `<tr><td class="name">${n}</td><td>${S(a)}</td><td>${S(b)}</td></tr>`).join("");
</script>
</body></html>
