<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オリジナルSVGアイコン サンプル</title>
<style>
body{font-family:"Hiragino Kaku Gothic ProN","Segoe UI",sans-serif;margin:0;padding:26px;background:#eceaee;color:#222;}
h1{font-size:21px;margin:0 0 4px;} .lead{color:#777;font-size:13px;margin:0 0 22px;}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:900px;}
.panel{border-radius:16px;padding:22px;}
.panel.cream{background:#f5f0e6;color:#c25a3c;}
.panel.dark{background:radial-gradient(120% 80% at 50% 0,#221d2c,#14121a);color:#cda46a;}
.panel h2{font-size:13px;letter-spacing:.1em;opacity:.7;margin:0 0 16px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px 10px;}
.ic{display:flex;flex-direction:column;align-items:center;gap:6px;}
.ic svg{width:34px;height:34px;}
.ic span{font-size:10.5px;opacity:.8;}
.sizes{margin-top:20px;display:flex;align-items:flex-end;gap:14px;}
.sizes svg{color:#c25a3c;}
.note{max-width:900px;color:#777;font-size:12.5px;margin-top:18px;line-height:1.6;}
</style></head><body>
<h1>🖋 オリジナルSVGアイコン（サンプル8点）</h1>
<p class="lead">私がコードで描いた線画アイコンです。クリーム地・ダーク地の両方で、テーマ色に自動でなじみます（1色・拡大しても劣化なし）。</p>

<div class="panels">
  <div class="panel cream"><h2>案B クリーム地</h2>
    <div class="grid" id="g1"></div>
  </div>
  <div class="panel dark"><h2>案D ダーク地</h2>
    <div class="grid" id="g2"></div>
  </div>
</div>

<div class="note">
  サイズ別（同じデータが滲まず拡大できます）:
  <div class="sizes" id="sizes"></div>
</div>
<p class="note">※これは線画スタイルの一例です。線を太く/細く、角を丸く/角張りなど、好みに合わせて全部そろえて調整できます。緻密な絵（写実的な振袖など）は不得手なので、その路線ならプロ依頼が向きます。</p>

<script>
const ICONS = {
  "提案(ギフト)": `<rect x="3" y="8" width="18" height="4" rx="1"/><rect x="4.5" y="12" width="15" height="8" rx="1"/><line x1="12" y1="8" x2="12" y2="20"/><path d="M12 8C9.5 4 6 5.5 12 8"/><path d="M12 8C14.5 4 18 5.5 12 8"/>`,
  "人": `<circle cx="8.5" cy="8" r="2.8"/><path d="M4 19c0-2.7 2-4.5 4.5-4.5S13 16.3 13 19"/><circle cx="16" cy="8.5" r="2.3"/><path d="M14.8 14.7c2.2.2 4.2 2 4.2 4.3"/>`,
  "カレンダー": `<rect x="3.5" y="5" width="17" height="15" rx="2"/><line x1="3.5" y1="9.5" x2="20.5" y2="9.5"/><line x1="8" y1="3" x2="8" y2="6"/><line x1="16" y1="3" x2="16" y2="6"/><circle cx="9" cy="14" r="1"/><circle cx="15" cy="14" r="1"/>`,
  "設定": `<line x1="4" y1="6.5" x2="20" y2="6.5"/><circle cx="9" cy="6.5" r="2"/><line x1="4" y1="12" x2="20" y2="12"/><circle cx="15" cy="12" r="2"/><line x1="4" y1="17.5" x2="20" y2="17.5"/><circle cx="8" cy="17.5" r="2"/>`,
  "誕生日": `<line x1="3.5" y1="20.5" x2="20.5" y2="20.5"/><path d="M5.5 20.5v-7c0-1 .8-1.8 1.8-1.8h9.4c1 0 1.8.8 1.8 1.8v7"/><path d="M5.5 15c1.3 1.3 2.8 1.3 4 0s2.8-1.3 4 0 2.8 1.3 4 0"/><line x1="12" y1="7" x2="12" y2="11"/><path d="M12 4.5c1.2 1 1.2 2.5 0 2.5s-1.2-1.5 0-2.5z"/>`,
  "記念日(ハート)": `<path d="M12 20s-7-4.6-7-9.7a3.9 3.9 0 0 1 7-2.4 3.9 3.9 0 0 1 7 2.4C19 15.4 12 20 12 20z"/>`,
  "クリスマス": `<path d="M12 3.5l-4 6h8z"/><path d="M12 7l-5.5 8h11z"/><rect x="10.5" y="15" width="3" height="3.5"/><circle cx="12" cy="3" r="0.6" fill="currentColor"/>`,
  "振袖(着物)": `<path d="M12 4.5 9.7 6.5 9 20h6l-.7-13.5z"/><path d="M12 4.5 9.7 6.5M12 4.5l2.3 2"/><path d="M9.7 6.7 6.5 9l1 4M14.3 6.7 17.5 9l-1 4"/><line x1="8.7" y1="12.5" x2="15.3" y2="12.5" stroke-width="2.2"/>`,
};
function svg(body, size){
  return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${body}</svg>`;
}
for (const dst of ["g1","g2"]){
  document.getElementById(dst).innerHTML = Object.entries(ICONS).map(([n,b]) =>
    `<div class="ic">${svg(b,34)}<span>${n}</span></div>`).join("");
}
document.getElementById("sizes").innerHTML = [16,24,34,48,72].map(s =>
  `<div style="text-align:center"><div>${svg(ICONS["提案(ギフト)"],s)}</div><span style="font-size:10px;color:#999">${s}px</span></div>`).join("");
</script>
</body></html>
